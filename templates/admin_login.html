<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - TechNova</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* Animated glowing waves */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, #00f5ff55, transparent 40%),
                        radial-gradient(circle at 80% 70%, #ff00ff55, transparent 40%);
            animation: moveBg 10s linear infinite alternate;
        }

        @keyframes moveBg {
            0% { transform: translate(0,0); }
            100% { transform: translate(-50px,-50px); }
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 420px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3),
                        0 0 60px rgba(255, 0, 255, 0.2);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.15);
            color: white;
            box-shadow: 0 0 10px #00f5ff;
        }

        .btn-login {
            background: linear-gradient(to right, #00f5ff, #ff00ff);
            border: none;
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00f5ff;
        }

        .logo {
            width: 90px;
            display: block;
            margin: 0 auto 15px;
        }

        .university-name {
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        ::placeholder{
            color:#ddd !important;
            opacity:1;
        }

    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="login-container">

    <!-- Logo -->
    <img src="{{ url_for('static', filename='images/technova_logo.png') }}" class="logo">

    <div class="university-name">
        University of TechNova <br>
        <small>Innovate. Inspire. Succeed.</small>
    </div>

    <h2>Admin Login</h2>

    {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" autocomplete="off">

        <input type="text"
               name="username"
               class="form-control mb-3"
               placeholder="Admin Username"
               required>

        <input type="password"
               name="password"
               class="form-control mb-4"
               placeholder="Password"
               required>

        <button class="btn btn-login w-100">
            Login
        </button>
        <a href="{{ url_for('login') }}" 
class="btn btn-outline-light w-100 mt-3">
Back to Portal
</a>

    </form>

</div>

</body>
</html>
