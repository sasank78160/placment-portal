<!DOCTYPE html>
<html>
<head>
    <title>Edit Drive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <h3>Edit Placement Drive</h3>

    <form method="POST">

        <div class="mb-3">
            <label>Job Title</label>
            <input type="text" name="job_title"
                   value="{{ drive['job_title'] }}"
                   class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Job Description</label>
            <textarea name="job_description"
                      class="form-control" required>{{ drive['job_description'] }}</textarea>
        </div>

        <div class="mb-3">
            <label>Eligibility</label>
            <input type="text" name="eligibility"
                   value="{{ drive['eligibility'] }}"
                   class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Deadline</label>
            <input type="date" name="deadline"
                   value="{{ drive['deadline'] }}"
                   class="form-control" required>
        </div>

        <button class="btn btn-success">Update</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>

    </form>
</div>

</body>
</html>
