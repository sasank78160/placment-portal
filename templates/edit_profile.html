<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile - TechNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center">
        <h3>Edit Profile</h3>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-sm">
            Back
        </a>
    </div>

    <hr>

    <div class="card bg-secondary p-4">

    <form method="POST" enctype="multipart/form-data">

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text"
                       name="full_name"
                       value="{{ student[0] }}"
                       class="form-control"
                       required>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text"
                       name="phone"
                       value="{{ student[1] }}"
                       class="form-control"
                       required>
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text"
                       name="address"
                       value="{{ student[2] }}"
                       class="form-control"
                       required>
            </div>

            <!-- Resume -->
          <div class="mb-3">
    <label class="form-label">Upload Resume (PDF/DOC)</label>
    <input type="file"
           name="resume"
           class="form-control">
</div>

{% if student[3] %}
<div class="mt-2">
    <small>Current Resume:</small>
    <a href="{{ url_for('static', filename='resumes/' ~ student[3]) }}"
       target="_blank"
       class="text-info">
        View Resume
    </a>
</div>

            {% endif %}

            <button class="btn btn-primary w-100">
                Save Changes
            </button>

        </form>

    </div>

</div>

</body>
</html>
